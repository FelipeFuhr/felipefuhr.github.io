name: ci

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-local-coverage:
    permissions: { contents: read }
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-ci-local-coverage.yml@df9c480572ce848d6b704dad8ac9a95b09e585ca # v1.7.1
    with: { mode: refs, enforce: true }

  actionlint:
    permissions: { contents: read }
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-actionlint.yml@df9c480572ce848d6b704dad8ac9a95b09e585ca # v1.7.1

  lint-and-test:
    name: lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ !github.event.pull_request.draft }}
    permissions: { contents: read }
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with: { egress-policy: audit }
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with: { go-version-file: go.mod }
      - run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - run: make lint
      - run: make coverage-gate
