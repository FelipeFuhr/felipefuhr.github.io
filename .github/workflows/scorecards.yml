name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: "20 7 * * 2"
  push:
    branches: [main]

permissions:
  contents: read
  actions: read
  security-events: write
  id-token: write
  issues: read
  pull-requests: read
  checks: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scorecard.yml@287f836a726a35af37bd24561fc687f66eaeb92f # v1.7.0
    with:
      upload-sarif: true
      publish-results: true
