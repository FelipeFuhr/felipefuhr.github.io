name: DevOps / Security

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  schedule:
    - cron: "0 5 25-31 * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    if: ${{ !github.event.pull_request.draft }}
    permissions: { contents: read, actions: read, security-events: write }
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-gitleaks.yml@287f836a726a35af37bd24561fc687f66eaeb92f # v1.7.0
    with: { working-directory: ".", scan-history: true, upload-sarif: false }
  trivy-fs:
    if: ${{ !github.event.pull_request.draft }}
    permissions: { contents: read, actions: read, security-events: write }
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scan-trivy-fs.yml@287f836a726a35af37bd24561fc687f66eaeb92f # v1.7.0
    with: { scan-ref: ".", upload-sarif: false }
  grype-fs:
    if: ${{ !github.event.pull_request.draft }}
    permissions: { contents: read, actions: read, security-events: write }
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scan-grype-fs.yml@287f836a726a35af37bd24561fc687f66eaeb92f # v1.7.0
    with: { path: ".", upload-sarif: false }
  osv:
    if: ${{ !github.event.pull_request.draft }}
    permissions: { contents: read, actions: read, security-events: write }
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-osv-scanner.yml@287f836a726a35af37bd24561fc687f66eaeb92f # v1.7.0
    with: { working-directory: ".", upload-sarif: false }
  semgrep:
    if: ${{ !github.event.pull_request.draft }}
    permissions: { contents: read, actions: read, security-events: write }
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-semgrep.yml@287f836a726a35af37bd24561fc687f66eaeb92f # v1.7.0
    with: { working-directory: "." }
  codeql:
    if: ${{ github.event_name != 'pull_request' }}
    permissions: { actions: read, contents: read, security-events: write }
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@287f836a726a35af37bd24561fc687f66eaeb92f # v1.7.0
    with: { languages: "go", source-root: "." }
