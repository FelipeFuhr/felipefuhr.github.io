name: DevOps / Automation

on:
  schedule:
    - cron: "0 3 25-31 * 0"  # last Sunday of month, 03:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    if: vars.SCORECARD_ENABLED == 'true' && github.event_name != 'pull_request'
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scorecard.yml@df9c480572ce848d6b704dad8ac9a95b09e585ca # v1.7.1
    with:
      upload-sarif: true

  stale:
    if: vars.STALE_ENABLED == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-stale.yml@df9c480572ce848d6b704dad8ac9a95b09e585ca # v1.7.1
    with:
      only: "both"

  release-please:
    if: vars.RELEASE_PLEASE_ENABLED == 'true' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-release-please.yml@df9c480572ce848d6b704dad8ac9a95b09e585ca # v1.7.1
    with:
      target-branch: "main"
    secrets:
      RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}

