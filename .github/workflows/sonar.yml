name: Code Quality (SonarCloud)
on:
  push: { branches: [main] }
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions: { contents: read }
jobs:
  sonar:
    permissions: { contents: read }
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-sonarcloud.yml@01e2b12e992621fecf074b8a202f66044196f3bf
    with: { working-directory: "." }
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
