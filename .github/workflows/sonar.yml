name: Code Quality (SonarCloud)
on:
  push: { branches: [main] }
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions: { contents: read }
jobs:
  sonar:
    permissions: { contents: read }
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-sonarcloud.yml@287f836a726a35af37bd24561fc687f66eaeb92f # v1.7.0
    with: { working-directory: "." }
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
