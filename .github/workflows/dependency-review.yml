name: Dependency Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  dependency-review:
    if: ${{ !github.event.pull_request.draft }}
    permissions: { contents: read, pull-requests: write }
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-dependency-review.yml@df9c480572ce848d6b704dad8ac9a95b09e585ca # v1.7.1
