name: Dependency Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  dependency-review:
    if: ${{ !github.event.pull_request.draft }}
    permissions: { contents: read, pull-requests: read }
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-dependency-review.yml@01e2b12e992621fecf074b8a202f66044196f3bf
