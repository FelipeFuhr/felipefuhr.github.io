name: Dependency Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  dependency-review:
    if: ${{ !github.event.pull_request.draft }}
    permissions: { contents: read, pull-requests: read }
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-dependency-review.yml@287f836a726a35af37bd24561fc687f66eaeb92f # v1.7.0
